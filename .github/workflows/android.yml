name: android-apk

# Builds an installable Android APK (debug-signed, fine for sideloading) from the
# Capacitor wrapper and publishes it to the `android-v*` GitHub Release so it can
# be downloaded directly on a phone. Trigger by touching `.android-trigger` and
# pushing, or from the Actions tab.
on:
  push:
    branches: [main]
    paths: [".android-trigger"]
  workflow_dispatch:

jobs:
  apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Resolve version
        id: ver
        run: echo "v=$(node -p "require('./src-tauri/tauri.conf.json').version")" >> "$GITHUB_OUTPUT"

      - name: Install deps
        run: npm ci || npm install

      - name: Sync web app into the Android project
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew --no-daemon assembleDebug

      - name: Stage APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk "PDF-Studio-${{ steps.ver.outputs.v }}.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: PDF-Studio-APK
          path: PDF-Studio-${{ steps.ver.outputs.v }}.apk

      - name: Publish APK to a GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="android-v${{ steps.ver.outputs.v }}"
          gh release delete "$TAG" --yes --cleanup-tag || true
          gh release create "$TAG" "PDF-Studio-${{ steps.ver.outputs.v }}.apk" \
            --title "PDF Studio Android v${{ steps.ver.outputs.v }} (APK)" \
            --notes "সাইডলোড করার মতো APK (debug-signed)। ফোনে ইনস্টল করতে: Settings → 'Install unknown apps' চালু করে APK খুলুন। Play Store-এর জন্য আলাদা signed AAB লাগবে।"
