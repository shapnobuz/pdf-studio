name: release

# Two ways to trigger this:
#   1. Touch the `.release-trigger` file and push to main — the version is read
#      from src-tauri/tauri.conf.json and tauri-action creates that tag + release.
#      (Handy where pushing git tags directly isn't allowed.)
#   2. Run it manually from the Actions tab via workflow_dispatch, optionally
#      overriding the version.
# Either way it builds the Windows installer, signs it with your Tauri signing
# key (stored as repo secrets — see AUTO_UPDATE_SETUP_BN.md), and publishes it
# as a GitHub Release together with the `latest.json` manifest the app's updater
# checks. Anyone running an older build gets prompted to update automatically
# the next time they open PDF Studio.
#
# The release notes come from the matching version section in CHANGELOG.md
# (see the "Prepare release notes" step below), so keep that file updated.

on:
  push:
    branches: [main]
    paths: [".release-trigger"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag override (blank = read from tauri.conf.json)"
        required: false
        default: ""

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Resolve the version tag: the workflow_dispatch override if given, else
      # v<version> read straight from src-tauri/tauri.conf.json.
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then V="${{ github.event.inputs.version }}";
          else V="v$(node -p "require('./src-tauri/tauri.conf.json').version")"; fi
          echo "tag=$V" >> "$GITHUB_OUTPUT"

      # tauri.conf.json's bundle.icon points at src-tauri/icons/*, which are
      # generated from src-tauri/logo.png (the single source of truth) and are
      # not committed. Regenerate them here so the bundler finds them.
      - name: Generate app icons
        run: npx --yes @tauri-apps/cli@latest icon src-tauri/logo.png --output src-tauri/icons

      # Pull the section for this version out of CHANGELOG.md and wrap it with a
      # fixed install/update footer to form the GitHub Release body. If the file
      # has no matching section, fall back to a generic line so the build never
      # fails just because the changelog wasn't updated.
      - name: Prepare release notes from CHANGELOG.md
        id: notes
        shell: bash
        run: |
          VERSION="${{ steps.ver.outputs.tag }}"
          VERSION="${VERSION#v}"
          section=""
          if [ -f CHANGELOG.md ]; then
            section="$(awk -v hdr="## [$VERSION]" '
              index($0, hdr) == 1                 { flag = 1; next }
              flag && (/^## \[/ || /^\[[^]]+\]: /) { flag = 0 }
              flag                                 { print }
            ' CHANGELOG.md)"
          fi
          if [ -z "$(printf '%s' "$section" | tr -d '[:space:]')" ]; then
            section="এই ভার্সনের বিস্তারিত পরিবর্তন CHANGELOG.md-এ দেখুন।"
          fi
          {
            echo "body<<__NOTES_EOF__"
            echo "## PDF Studio v$VERSION"
            echo ""
            echo "$section"
            echo ""
            echo "### 📥 ইনস্টল"
            echo "নিচের \`PDF.Studio_${VERSION}_x64-setup.exe\` ফাইলটি ডাউনলোড করে চালান।"
            echo "প্রথমবার Windows SmartScreen সতর্ক করলে → **More info → Run anyway**।"
            echo ""
            echo "### 🔄 আপডেট"
            echo "যাদের আগে থেকেই PDF Studio ইনস্টল করা আছে, তাঁরা পরের বার app খুললেই এই নতুন ভার্সনের update-toast দেখবেন — এক ক্লিকেই ডাউনলোড, ইনস্টল ও রিস্টার্ট।"
            echo "__NOTES_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Build, sign, and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.ver.outputs.tag }}
          releaseName: "PDF Studio ${{ steps.ver.outputs.tag }}"
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
