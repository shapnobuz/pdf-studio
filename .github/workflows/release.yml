name: release

# Two ways to trigger this:
#   1. Push a version tag:  `git tag v3.10.2 && git push --tags`
#   2. Run it manually from the Actions tab (or the API) via workflow_dispatch,
#      passing the version (e.g. `v3.10.2`) — tauri-action then creates that tag
#      and release for you. Handy when tag pushes aren't available.
# Either way it builds the Windows installer, signs it with your Tauri signing
# key (stored as repo secrets — see AUTO_UPDATE_SETUP_BN.md), and publishes it
# as a GitHub Release together with the `latest.json` manifest the app's updater
# checks. Anyone running an older build gets prompted to update automatically
# the next time they open PDF Studio.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to create and release, e.g. v3.10.1"
        required: true
        default: "v3.10.1"

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # tauri.conf.json's bundle.icon points at src-tauri/icons/*, which are
      # generated from src-tauri/logo.png (the single source of truth) and are
      # not committed. Regenerate them here so the bundler finds them.
      - name: Generate app icons
        run: npx --yes @tauri-apps/cli@latest icon src-tauri/logo.png --output src-tauri/icons

      - name: Build, sign, and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.version || github.ref_name }}
          releaseName: "PDF Studio ${{ inputs.version || github.ref_name }}"
          releaseBody: |
            ## PDF Studio ${{ inputs.version || github.ref_name }}

            সম্পূর্ণ অফলাইন, প্রাইভেট PDF রিডার ও এডিটর — জমির দলিল, কোর্ট পেপার আর ইনভয়েসের জন্য তৈরি। কোনো ডেটা বাইরে যায় না, সব কাজ নিজের কম্পিউটারেই। বাংলা OCR সহ (যা Adobe Acrobat পারে না)।

            ### 📥 ইনস্টল
            নিচের `PDF.Studio_..._x64-setup.exe` ফাইলটি ডাউনলোড করে চালান।
            প্রথমবার Windows SmartScreen সতর্ক করলে → **More info → Run anyway**।

            ### 🔄 আপডেট
            যাদের আগে থেকেই PDF Studio ইনস্টল করা আছে, তাঁরা পরের বার app খুললেই এই নতুন ভার্সনের update-toast দেখবেন — এক ক্লিকেই ডাউনলোড, ইনস্টল ও রিস্টার্ট।
          releaseDraft: false
          prerelease: false
